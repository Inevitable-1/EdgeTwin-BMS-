; EdgeTwin-BMS+ ESP32 Firmware Configuration
; AI-Powered Edge Digital Twin & Battery Passport Platform

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Library dependencies
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.9.1
    adafruit/Adafruit INA219@^1.2.1
    ESP Async WebServer
    AsyncTCP

; Build flags for TFLite Micro
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DTF_LITE_STATIC_MEMORY
    -DTF_LITE_DISABLE_X86_NEON
    -DNO_TFLM_EXPERIMENTAL_OPS
    -DLITE_PROFILER_ENABLE
    -DARDUINO_ARCH_ESP32

; Partition scheme with OTA support
board_build.partitions = min_spiffs.csv

; Memory optimization
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.maximum_ram_size = 327680
board_build.maximum_size = 1310720

; Monitor filters
monitor_filters = esp32_exception_decoder

[env:debug]
build_type = debug
build_flags = 
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_MODE=1

[env:release]
build_type = release
build_flags = 
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DRELEASE_MODE=1
