# =============================================================================
# EdgeTwin-BMS+ Mosquitto ACL Configuration
# =============================================================================

# Topic access control list

# Pattern for ESP32 devices - can publish telemetry and alerts, subscribe to commands
pattern write edgetwin/%c/telemetry
pattern write edgetwin/%c/alerts
pattern read edgetwin/%c/commands

# Backend can read all telemetry and alerts, write commands
topic read edgetwin/+/telemetry
topic read edgetwin/+/alerts
topic write edgetwin/+/commands

# Gateway can read and write all topics
topic readwrite edgetwin/#

# System topics (for monitoring)
topic read $SYS/#
